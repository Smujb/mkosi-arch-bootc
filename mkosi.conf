[Config]
MinimumVersion=27~devel
Profiles=
		bootc

[Build]
ToolsTree=default
History=yes
CacheDirectory=mkosi.cache
Incremental=yes

[Distribution]
Distribution=arch
Release=rolling

[Content]
Packages=
		linux
		linux-firmware
		dosfstools
		pacman
		base
		helix
		fastfetch

[Output]
ImageId=arch-test
OutputDirectory=mkosi.output
Output=%i_%v_%a
